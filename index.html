<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            font-family: sans-serif;
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .loader {
            position: fixed;
            inset: 0;
            background: #011216;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
            will-change: opacity;
        }

        .loader.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loader img {
            width: 120px;
            margin-bottom: 20px;
            animation: spin 1.5s linear infinite;
        }

        .text {
            font-size: 14px;
            color: #ffffff;
        }

        .hide-logo {
            position: fixed;
            top: 0;
            left: 0;
            width: 120px;
            height: 37px;
            background: #444444;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hide-logo img {
            width: 100%;
            height: 95%;
            margin-top: 2px;
            object-fit: contain;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="hide-logo"><img src="namlongav-logo.png" alt=""></div>
    <div id="loader" class="loader">
        <img src="namlongav-logo.png">
        <div class="text">Đang tải...</div>
    </div>
    <iframe id="frame" src="https://online.anyflip.com/qrzlr/okht/index.html" loading="lazy">
    </iframe>

    <script>
        const frame = document.getElementById("frame");
        const loader = document.getElementById("loader");

        let isLoaded = false;

        function hideLoader() {
            loader.classList.add("hide");
        }

        frame.onload = function () {
            isLoaded = true;
            setTimeout(hideLoader, 300);
        };

        setTimeout(() => {
            if (!isLoaded) {
                hideLoader();
            }
        }, 4000);

        window.addEventListener("load", () => {
            setTimeout(hideLoader, 2000);
        });

    </script>

</body>

</html>
