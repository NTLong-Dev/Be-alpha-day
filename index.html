<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <title>Nam Long AV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont
        }

        .card {
            border-radius: 22px
        }

        .form-control {
            border-radius: 12px
        }

        .btn {
            border-radius: 14px
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto
        }

        .logo img {
            width: 120px;
        }

        input {
            font-size: 15px !important;
            padding: 12px 16px;
        }

        h4 {
            font-size: 25px;
        }

        P {
            font-size: 17px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow-lg">
                    <div class="card-body p-4 p-lg-5">

                        <div class="logo">
                            <img src="namlong.png">
                        </div>

                        <h4 class="text-center fw-bold mb-2">Đăng ký thông tin</h4>
                        <p class="text-center text-muted mb-4">Xin mời quý khách nhập thông tin</p>

                        <form id="switForm">

                            <div class="mb-2">
                                <label class="form-label">Họ và tên: </label>
                                <input type="text" id="name" class="form-control form-control-lg" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Số điện thoại: </label>
                                <input type="tel" id="phone" class="form-control form-control-lg" required
                                    minlength="10" maxlength="10">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Công ty: </label>
                                <input type="text" id="company" class="form-control form-control-lg" required>
                            </div>

                            <button type="submit" class="btn btn-dark w-100 btn-lg" id="submitBtn">
                                Gửi thông tin
                            </button>

                        </form>

                        <div id="loading" class="text-center mt-3 text-muted d-none">
                            Đang xử lý...
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>

        const API_URL = "https://script.google.com/macros/s/AKfycbzdRnmhIq51Flgu7x9cHyLnTfnlpffmiH6oGYwf4S307crPc3TxrYVqYPcpljzRzsfT/exec"

        const form = document.getElementById("switForm")
        const submitBtn = document.getElementById("submitBtn")
        const loading = document.getElementById("loading")

        let isSubmitting = false

        form.addEventListener("submit", function (e) {

            e.preventDefault()

            if (isSubmitting) return

            const name = document.getElementById("name").value.trim()
            const company = document.getElementById("company").value.trim()
            const phone = document.getElementById("phone").value.trim()

            if (!name || !company || !phone) {
                alert("Vui lòng nhập đầy đủ thông tin")
                return
            }

            isSubmitting = true
            submitBtn.disabled = true
            loading.classList.remove("d-none")

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ name, company, phone })
            })
                .then(() => {
                    window.location.href = "https://ntlong-dev.github.io/Av-connect-2026/catalog.html"
                })
                .catch(() => {
                    submitBtn.disabled = false
                    loading.classList.add("d-none")
                    isSubmitting = false
                })

        })

    </script>

</body>

</html>
