<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <title>SWIT Việt Nam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont
        }

        .card {
            border-radius: 22px
        }

        .form-control {
            border-radius: 12px
        }

        .btn {
            border-radius: 14px
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto
        }

        .logo img {
            width: 250px
        }

        .voucher-box {
            border: 2px dashed red;
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            margin-bottom: 12px
        }

        .voucher-code {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: red
        }

        .small-note {
            font-size: 13px;
            color: #666
        }

        .confetti {
            position: fixed;
            width: 8px;
            z-index: 9999;
            height: 14px;
            pointer-events: none;
            animation: burst linear forwards
        }

        @keyframes burst {
            to {
                transform: translate(var(--dx), var(--dy)) rotate(720deg);
                opacity: 0
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow-lg">
                    <div class="card-body p-4 p-lg-5">

                        <div class="logo">
                            <img src="swit-logo.png">
                        </div>

                        <h4 class="text-center fw-bold mb-2">Nhận ưu đãi & voucher</h4>
                        <p class="text-center text-muted mb-4">Xin mời quý khách nhập thông tin</p>

                        <form id="switForm">

                            <div class="mb-3">
                                <label class="form-label">Họ và tên</label>
                                <input type="text" id="name" class="form-control form-control-lg" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Số điện thoại</label>
                                <input type="tel" id="phone" class="form-control form-control-lg" required
                                    minlength="10" maxlength="10">
                            </div>

                            <button type="submit" class="btn btn-dark w-100 btn-lg" id="submitBtn">
                                Gửi thông tin
                            </button>

                        </form>

                        <div id="loading" class="text-center mt-3 text-muted d-none">
                            Đang xử lý...
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="voucherModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Chúc mừng bạn đã trúng thưởng</h5>
                </div>

                <div class="modal-body">

                    <div class="voucher-box">
                        <div class="mb-2">Mã voucher của bạn</div>
                        <div id="voucherCode" class="voucher-code"></div>
                    </div>

                    <div class="small-note">
                        Chương trình giảm giá 10% tất cả các mã pin SWIT áp dụng tại sự kiện
                        Be Alpha Day ngày 14/03/2026.
                        Thời gian sử dụng từ 14/03/2026 đến 14/06/2026.
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-dark w-100" id="acceptBtn">
                        Chấp nhận
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        const API_URL = "https://script.google.com/macros/s/AKfycbxvsJNVz4H_Ey3bvMss54ScrXdfubCBnl_c5HcU2J-Ie_SU2kB9WJfg9zBGHL6qm87NZA/exec"
        const REDIRECT_URL = "https://web.facebook.com/switvietnam"

        const form = document.getElementById("switForm")
        const submitBtn = document.getElementById("submitBtn")
        const loading = document.getElementById("loading")

        let isSubmitting = false

        function launchConfettiFromVoucher() {

            const box = document.querySelector(".voucher-box")
            if (!box) return

            const rect = box.getBoundingClientRect()

            const startX = rect.left + rect.width / 2
            const startY = rect.top + rect.height / 2

            for (let i = 0; i < 80; i++) {

                const c = document.createElement("div")
                c.className = "confetti"

                const colors = ["#ff0000", "#ffd700", "#00c853", "#2979ff", "#ff9100"]
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)]

                const angle = Math.random() * Math.PI * 2
                const distance = 120 + Math.random() * 200

                const dx = Math.cos(angle) * distance
                const dy = Math.sin(angle) * distance

                c.style.left = startX + "px"
                c.style.top = startY + "px"

                c.style.setProperty("--dx", dx + "px")
                c.style.setProperty("--dy", dy + "px")

                c.style.animationDuration = (0.7 + Math.random() * 0.5) + "s"

                document.body.appendChild(c)

                setTimeout(() => c.remove(), 1200)

            }

        }

        form.addEventListener("submit", function (e) {

            e.preventDefault()

            if (isSubmitting) return

            const name = document.getElementById("name").value.trim()
            const phone = document.getElementById("phone").value.trim()

            if (!name || !phone) {

                alert("Vui lòng nhập đầy đủ thông tin")
                return

            }

            if (phone.length !== 10) {

                alert("Số điện thoại không hợp lệ")
                return

            }

            isSubmitting = true
            submitBtn.disabled = true
            loading.classList.remove("d-none")

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ name, phone })
            })
                .then(r => r.json())
                .then(res => {

                    loading.classList.add("d-none")

                    if (!res.voucher) {

                        alert("Có lỗi xảy ra")
                        submitBtn.disabled = false
                        isSubmitting = false
                        return

                    }

                    document.getElementById("voucherCode").innerText = res.voucher

                    const modalEl = document.getElementById("voucherModal")

                    const modal = new bootstrap.Modal(modalEl, {
                        backdrop: "static",
                        keyboard: false
                    })

                    modal.show()

                    modalEl.addEventListener("shown.bs.modal", launchConfettiFromVoucher, { once: true })

                })
                .catch(() => {

                    alert("Không gửi được dữ liệu")

                    submitBtn.disabled = false
                    loading.classList.add("d-none")
                    isSubmitting = false

                })

        })

        document.getElementById("acceptBtn").addEventListener("click", function () {

            window.location.href = REDIRECT_URL

        })

    </script>

</body>

</html>
